<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영업 상세 현황</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="container">

    <header class="header">
      <h1>IT영업부 매출 현황</h1>
      <a href="index.html" class="header-back">← 메인으로</a>
    </header>

    <section class="panel">
      <h2 class="panel-title">영업 상세 현황</h2>
      <table class="table table-detail">
        <thead>
          <tr>
            <th>고객사</th>
            <th>종류</th>
            <th>금액</th>
            <th>계약일</th>
            <th>설명</th>
          </tr>
        </thead>
        <tbody id="detail-list">
          <tr class="empty-row">
            <td colspan="5">등록된 영업 건이 없습니다.</td>
          </tr>
        </tbody>
      </table>
    </section>

  </div>
  <script src="index.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tbody = document.getElementById('detail-list');
      const data = loadData();
      if (data.length === 0) return;
      tbody.innerHTML = data.map(e => `
        <tr>
          <td>${e.client}</td>
          <td>${e.type}</td>
          <td>${formatAmount(e.amount)}</td>
          <td>${e.date}</td>
          <td class="desc-cell">${e.desc || '-'}</td>
        </tr>`).join('');
    });
  </script>
</body>
</html>
